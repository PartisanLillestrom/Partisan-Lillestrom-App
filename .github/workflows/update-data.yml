name: Oppdater nyheter og kampdata

on:
  schedule:
    # Tolv kjøringer daglig, én i timen 07-18 norsk sommertid. GitHub
    # forsinker for tiden scheduled-kjøringer med ~3 timer og dropper en
    # del helt, så vi overbooker kraftig - naturlig frafall og forsinkelse
    # gir likevel jevnlige oppdateringer gjennom hele dagen. Skriptet
    # committer kun ved endringer. Skjeve minuttall unngår køen på :00.
    # Tidene er UTC; norsk tid er +2 om sommeren, +1 om vinteren.
    - cron: '17 5,7,9,11,13,15 * * *'   # 07:17, 09:17, 11:17, 13:17, 15:17, 17:17 sommertid
    - cron: '43 6,8,10,12,14,16 * * *'  # 08:43, 10:43, 12:43, 14:43, 16:43, 18:43 sommertid
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v5

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer avhengigheter
        run: pip install openpyxl

      - name: Kjor oppdateringsskript
        run: python3 scripts/update_data.py

      - name: Commit og push data.json hvis det er endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Ingen endringer i data.json - hopper over commit."
          else
            git commit -m "Automatisk oppdatering av data.json"
            git push
          fi

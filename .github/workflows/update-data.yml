name: Oppdater nyheter og kampdata

on:
  schedule:
    # Tre kjøringer daglig. Skjeve minuttall (:17/:23/:43) - GitHub dropper
    # oftere kjøringer på hele og halve klokkeslett pga. stor pågang.
    # Tidene er UTC; norsk tid er +2 om sommeren, +1 om vinteren.
    - cron: '17 6 * * *'    # morgen (08:17 sommer / 07:17 vinter)
    - cron: '23 10 * * *'   # formiddag (12:23 / 11:23)
    - cron: '43 14 * * *'   # ettermiddag (16:43 / 15:43)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v5

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kjor oppdateringsskript
        run: python3 scripts/update_data.py

      - name: Commit og push data.json hvis det er endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Ingen endringer i data.json - hopper over commit."
          else
            git commit -m "Automatisk oppdatering av data.json"
            git push
          fi

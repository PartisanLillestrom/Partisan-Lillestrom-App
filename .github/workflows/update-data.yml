name: Oppdater nyheter og kampdata

on:
  schedule:
    - cron: '0 4,10,14,18 * * *'  # 06/12/16/20 norsk tid sommertid (CEST)
    - cron: '0 5,11,15,19 * * *'  # 06/12/16/20 norsk tid vintertid (CET)
  workflow_dispatch: {}   # gjor det muhlig a trigge manuelt fra "Actions"-fanen pa GitHub


permissions:
  contents: write


jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v4


      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'


      - name: Kjor oppdateringsskript
        run: python3 scripts/update_data.py


      - name: Commit og push data.json hvis det er endret
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Ingen endringer i data.json - hopper over commit."
          else
            git commit -m "Automatisk oppdatering av nyheter og kampdata"
            git push
          fi

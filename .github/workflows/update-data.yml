name: Oppdater nyheter og kampdata

on:
  schedule:
    # Seks kjøringer daglig - GitHub dropper jevnlig scheduled-kjøringer,
    # så vi overbooker og lar naturlig frafall gjøre jobben. Skriptet
    # committer kun ved faktiske endringer, så ekstra kjøringer er gratis.
    # Skjeve minuttall (:17/:23/:43) unngår køen på hele/halve klokkeslett.
    # Tidene er UTC; norsk tid er +2 om sommeren, +1 om vinteren.
    - cron: '17 5 * * *'    # 07:17 sommer / 06:17 vinter
    - cron: '17 7 * * *'    # 09:17 / 08:17
    - cron: '23 9 * * *'    # 11:23 / 10:23
    - cron: '23 11 * * *'   # 13:23 / 12:23
    - cron: '43 13 * * *'   # 15:43 / 14:43
    - cron: '43 15 * * *'   # 17:43 / 16:43
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Sjekk ut repo
        uses: actions/checkout@v5

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kjor oppdateringsskript
        run: python3 scripts/update_data.py

      - name: Commit og push data.json hvis det er endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "Ingen endringer i data.json - hopper over commit."
          else
            git commit -m "Automatisk oppdatering av data.json"
            git push
          fi
